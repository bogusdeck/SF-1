<!-- templates/signup.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body" ng-controller="AuthController">
                <h2 class="card-title text-center mb-4">Sign Up</h2>
                <form ng-submit="signup()">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" ng-model="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" ng-model="username" placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" ng-model="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="dob" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="dob" ng-model="dob" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" ng-model="password" 
                               placeholder="Choose a password" required>
                        <div class="form-text">Password must be at least 8 characters long</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" 
                               ng-model="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <div class="alert alert-danger" ng-if="error" role="alert">
                        [[ error ]]
                    </div>
                    <div class="alert alert-danger" ng-if="password !== confirmPassword" role="alert">
                        Passwords do not match
                    </div>
                    <button type="submit" class="btn btn-primary w-100" 
                            ng-disabled="password !== confirmPassword">Sign Up</button>
                </form>
                <p class="text-center mt-3">
                    Already have an account? <a href="{% url 'login' %}">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
